# Streamlit Secrets Configuration
# Agrega tus claves API y credenciales aquí

[openai]
api_key = "your-openai-api-key-here"

[supabase]
url = "your-supabase-url-here"
key = "your-supabase-anon-key-here"

[database]
# Para desarrollo local con SQLite, no necesitas credenciales
# Para producción con PostgreSQL, agrega tus credenciales aquí
user = "your-db-user"
password = "your-db-password"
host = "localhost"
port = "5432"
database = "ecosistema_luis"

[google]
# Para integración con Google Calendar/Drive
api_key = "your-google-api-key"
client_id = "your-google-client-id"
client_secret = "your-google-client-secret"
